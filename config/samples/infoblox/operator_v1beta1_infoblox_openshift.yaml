apiVersion: externaldns.olm.openshift.io/v1beta1
kind: ExternalDNS
metadata:
  name: sample-infoblox
spec:
  domains:
  - filterType: Include
    matchType: Exact
    name: myzonedomain.com
  # interval sets the polling interval for DNS record synchronization (optional).
  # When omitted, the upstream ExternalDNS default (1m) is used.
  # interval: "5m"
  provider:
    type: Infoblox
    infoblox:
      credentials:
        name: infoblox-credentials
      gridHost: "100.100.100.100"
      wapiPort: 443
      wapiVersion: "2.12.2"
      # maxResults sets the _max_results query parameter for Infoblox WAPI GET requests (optional).
      # Required when the DNS zone contains more than 1000 records.
      # maxResults: 1500
  source:
    # Source Type is route resource of OpenShift
    type: OpenShiftRoute
    # In case you have multiple ingress controllers you must specify ingress controller name in the routerName
    # so that the external dns will use the router canonical name correrponding to it to create a dns record.
    openshiftRouteOptions:
      routerName: default
